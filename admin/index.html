<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedRep Pro — Content Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
</head>
<body>
  <!-- config.yml (in this same /admin folder) tells Decap what content -->
  <!-- types to show and where in the GitHub repo to save them. -->

  <!-- Netlify Identity widget: handles invite/confirm/recovery tokens -->
  <!-- and shows the password-set modal instead of just loading the site. -->
  

  <!-- This one line loads the entire Decap CMS admin UI. -->
  <!-- Decap CMS is the actively-maintained continuation of the project -->
  <!-- formerly known as "Netlify CMS" — same tool, same config format. -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
