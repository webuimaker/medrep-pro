# ══════════════════════════════════════════════════════════════
# Decap CMS config for MedRep Pro
# This file controls what you see and can edit at yoursite.com/admin
# Docs: https://decapcms.org/docs/configuration-options/
# ══════════════════════════════════════════════════════════════

backend:
  name: git-gateway     # lets Netlify Identity handle login + commits to GitHub
  branch: master          # change if your default branch is called something else

# Where uploaded images (product photos, doctor photos) get saved in the repo,
# and the URL path the website will use to load them.
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Optional: shows a "Published"/"Draft" toggle in the CMS UI (nice for review).
publish_mode: simple

collections:

  # ──────────────────────────────────────────────
  # 1) DOCTORS — one JSON file holding a list of doctors
  # ──────────────────────────────────────────────
  - name: "doctors"
    label: "👨‍⚕️ Doctors"
    files:
      - name: "doctors"
        label: "Doctor List"
        file: "content/doctors.json"
        fields:
          - label: "Doctors"
            name: "doctors"
            widget: "list"
            summary: "{{fields.name}} — {{fields.specialty}}"
            fields:
              - { label: "Doctor Name",   name: "name",         widget: "string" }
              - { label: "Qualification", name: "qualification", widget: "string" }
              - label: "Specialty"
                name: "specialty"
                widget: "select"
                options:
                  - "Orthopaedics"
                  - "Physician"
                  - "Neurology"
                  - "General Physician"
                  - "Gastroenterology"
                  - "Paediatrics"
                  - "Gynaecology"
                  - "Ophthalmology"
                  - "ENT"
                  - "Dentistry"
                  - "Dermatology"
              - { label: "Hospital",      name: "hospital",     widget: "string" }
              - { label: "Clinic",        name: "clinic",       widget: "string", required: false }
              - { label: "City",          name: "city",         widget: "string" }
              - { label: "State",         name: "state",        widget: "string" }
              - { label: "Mobile",        name: "mobile",       widget: "string", required: false }
              - { label: "Email",         name: "email",        widget: "string", required: false }
              - { label: "Notes",         name: "notes",        widget: "text",   required: false }
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["Active", "Inactive"]
                default: "Active"
              - label: "Catalogue Assigned"
                name: "catalog"
                widget: "relation"
                collection: "categories"
                file: "categories"
                search_fields: ["categories.*.title"]
                display_fields: ["categories.*.title"]
                value_field: "categories.*.id"
                hint: "Which category tab this doctor's badge/tag reflects"
              - label: "Assigned Products"
                name: "products"
                widget: "relation"
                collection: "products"
                file: "products"
                search_fields: ["products.*.name"]
                display_fields: ["products.*.name"]
                value_field: "products.*.name"
                multiple: true
                required: false
                hint: "Tick every product this doctor should see when their profile is opened"

  # ──────────────────────────────────────────────
  # 2) PRODUCTS — one JSON file holding a list of products
  # ──────────────────────────────────────────────
  - name: "products"
    label: "💊 Products"
    files:
      - name: "products"
        label: "Product List"
        file: "content/products.json"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Product Name",  name: "name",     widget: "string" }  
              - label: "Assigned Categories"
                name: "categories"
                widget: "relation"
                collection: "categories"
                file: "categories"
                search_fields: ["categories.*.title"]
                display_fields: ["categories.*.title"]
                value_field: "categories.*.id"
                multiple: true
                required: false
                hint: "Select every catalogue tab this product should appear under — a product can belong to more than one"
              - { label: "Composition",   name: "molecule", widget: "string" }
              - label: "Product Image"
                name: "image"
                widget: "image"
                required: false
                hint: "Upload the product card / brochure image" 
              - label: "Assigned Doctors"
                name: "assignedDoctors"
                widget: "relation"
                collection: "doctors"
                file: "doctors"
                search_fields: ["doctors.*.name"]
                display_fields: ["doctors.*.name"]
                value_field: "doctors.*.name"
                multiple: true
                required: false
                hint: "Tick every doctor this product should be recommended for — mirrors the doctor's own Assigned Products picker"
              - label: "Materials Count"
                name: "materialsCount"
                widget: "number"
                default: 0
                hint: "How many brochure/detail slides exist for this product"
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["Active", "Inactive"]
                default: "Active"

  # ──────────────────────────────────────────────
  # 3) CATALOGUE CATEGORIES — the tabs (Ortho / General / Eye)
  # ──────────────────────────────────────────────
  - name: "categories"
    label: "📋 Catalogue Categories"
    files:
      - name: "categories"
        label: "Categories"
        file: "content/categories.json"
        fields:
          - label: "Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "ID (used internally, no spaces)", name: "id", widget: "string" }
              - { label: "Title",       name: "title", widget: "string" }
              - { label: "Accent Color", name: "color", widget: "color", default: "#1B7FC4" }
              - { label: "Background Color", name: "bg", widget: "color", default: "#EBF5FF" }
              - { label: "Icon (emoji)", name: "icon", widget: "string", default: "💊" }
              - label: "Specialties shown under this category"
                name: "specialties"
                widget: "list"
                field: { label: "Specialty", name: "specialty", widget: "string" }

  # ──────────────────────────────────────────────
  # 4) APP SETTINGS — cover & thank-you slides shown at the start/end of
  #    every presentation, no matter which doctor, product, or category
  #    it was opened from.
  # ──────────────────────────────────────────────
  - name: "settings"
    label: "⚙️ App Settings"
    files:
      - name: "settings"
        label: "Presentation Settings"
        file: "content/settings.json"
        fields:
          - label: "Opening / Cover Slide"
            name: "coverImage"
            widget: "image"
            required: false
            hint: "Shown as the very first slide in every presentation (e.g. Coastal Healthcare intro)"
          - label: "Closing / Thank You Slide"
            name: "thanksImage"
            widget: "image"
            required: false
            hint: "Shown as the very last slide in every presentation"
