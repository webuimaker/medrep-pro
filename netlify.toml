# ══════════════════════════════════════════════════════════════
# Netlify site configuration for MedRep Pro
# The site itself is still plain static HTML/JS (no framework, no
# bundler). The only thing the build step does is run
# scripts/optimize-images.js, which resizes/compresses anything under
# images/uploads before it's published — including images just added
# through /admin, since every CMS save triggers a fresh build here.
# ══════════════════════════════════════════════════════════════

[build]
  publish = "."
  command = "npm install && npm run build"

# Keep the JSON content files fresh on every request instead of cached,
# so edits made in /admin show up on the live site right away.
[[headers]]
  for = "/content/*.json"
  [headers.values]
    Cache-Control = "no-cache"

# Product/doctor images: safe to cache aggressively. Every CMS save
# triggers a fresh Netlify deploy, and Netlify's Image CDN automatically
# re-runs transforms after a new deploy — so browsers won't get stuck
# showing a stale image, even with a long cache lifetime.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Netlify Image CDN transform requests (the /.netlify/images?url=...&w=...
# URLs generated by the app) — same reasoning as above.
[[headers]]
  for = "/.netlify/images*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Service worker file itself should never be cached long-term, so updates
# to the caching logic roll out promptly.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Standard SPA-friendly fallback (harmless here, useful if you later add routes)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
