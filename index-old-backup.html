<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MedRep Pro — Coastal Healthcare</title>
<script>
  (function () {
    var hash = window.location.hash;
    if (hash && /(confirmation_token|invite_token|recovery_token|email_change_token)=/.test(hash)) {
      window.location.replace('/admin/' + hash);
    }
  })();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1B3A6B;--azure:#2D7DC9;--light:#EBF5FF;--white:#fff;
  --ortho:#E85D26;--ortho-bg:#FFF3EE;
  --general:#1B7FC4;--general-bg:#EBF5FF;
  --eye:#7B2FBE;--eye-bg:#F5EEFF;
  --text:#1a1a2e;--muted:#64748B;--border:#E2E8F0;
  --radius:14px;--shadow:0 4px 24px rgba(0,0,0,0.10);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4F8;min-height:100vh;overscroll-behavior:none}
/* ═══ LAYOUT ═══ */
#app{display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--navy);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
#topbar .top-left{
    display: flex;
    gap: 30px;
    align-items: center;
}
#topbar .logo{display:flex;align-items:center;gap:10px}
#topbar .logo-icon{width:36px;height:36px;background:var(--azure);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
#topbar h1{color:#fff;font-size:18px;font-weight:700;letter-spacing:-0.3px}
#topbar .sub{color:rgba(255,255,255,0.55);font-size:11px;margin-top:1px}
#topbar .mr-chip{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:6px 12px;color:#fff;font-size:12px;font-weight:500}
#main{flex:1;padding:20px;max-width:1100px;width:100%;margin:0 auto}
/* ═══ TOP NAV TOGGLE (Doctors | Catalogue) ═══ */
.top-toggle{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);border-radius:12px;padding:3px}
.top-nav-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border:none;background:transparent;border-radius:9px;cursor:pointer;transition:all .18s;color:rgba(255,255,255,0.65);font-size:13px;font-weight:600;white-space:nowrap}
.top-nav-btn:hover{color:#fff}
.top-nav-btn.active{background:var(--azure);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.25)}
/* ═══ SCREENS ═══ */
.screen{display:none}.screen.active{display:block}
/* ═══ SEARCH / FILTER ═══ */
.toolbar{display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:11px 14px 11px 38px;border-radius:12px;border:1.5px solid var(--border);font-size:14px;background:#fff;outline:none;transition:border .15s}
.search-box input:focus{border-color:var(--azure)}
.search-box .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.5}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--muted);white-space:nowrap}
.chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
/* ═══ DOCTOR GRID ═══ */
.doctor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.doctor-card{background:#fff;border-radius:var(--radius);padding:18px 16px;cursor:pointer;transition:all .2s;border:1.5px solid transparent;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.doctor-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--azure)}
.doctor-card:active{transform:scale(0.97)}
.doc-avatar{width:60px;height:60px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--navy),var(--azure))}
.doc-name{font-size:14px;font-weight:600;color:var(--text);text-align:center;margin-bottom:4px}
.doc-deg{font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px}
.spec-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;margin:0 auto 12px;display:flex;justify-content:center;width:fit-content}
.view-btn{width:100%;padding:8px;border-radius:8px;border:none;background:var(--navy);color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.view-btn:hover{background:var(--azure)}
/* ═══ DOCTOR DETAIL ═══ */
#back-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#fff;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--navy);margin-bottom:16px;width:fit-content;transition:all .15s}
#back-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.detail-header{background:linear-gradient(135deg,var(--navy) 0%,#1058A0 100%);border-radius:var(--radius);padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:20px;box-shadow:var(--shadow)}
.detail-avatar{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.15);border:3px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0}
.detail-info h2{color:#fff;font-size:20px;font-weight:700;margin-bottom:4px}
.detail-info p{color:rgba(255,255,255,0.7);font-size:13px;margin-bottom:8px}
.detail-spec-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:12px;font-weight:600}
.products-section h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px}
.products-section .subtitle{font-size:12px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.products-section .subtitle .lock{background:#FFF3CD;color:#856404;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:500}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.product-card{background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1.5px solid transparent}
.product-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.product-card:active{transform:scale(0.97)}
.product-thumb{width:100%;height:110px;object-fit:cover;display:block;background:#f0f0f0}
.product-info{padding:12px}
.product-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.product-molecule{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4}
.present-btn{width:100%;padding:7px;border-radius:7px;border:none;font-size:11px;font-weight:600;cursor:pointer;color:#fff;transition:background .15s}
/* ═══ LIGHTBOX ═══ */
#lightbox{position:fixed;inset:0;background:#000;z-index:1000;display:none;flex-direction:column;touch-action:none}
#lightbox.open{display:flex}
#lb-topbar{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);flex-shrink:0}
#lb-product-name{color:#fff;font-size:14px;font-weight:600}
#lb-doctor-name{color:rgba(255,255,255,0.5);font-size:11px;margin-top:2px}
#lb-close{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
#lb-close:hover{background:rgba(255,255,255,0.25)}
#lb-image-area{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
#lb-img{max-width:100%;max-height:100%;object-fit:contain;transition:transform .25s ease;user-select:none;pointer-events:none;display:block}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:10}
.lb-arrow:hover{background:rgba(255,255,255,0.25)}
#lb-prev{left:12px}
#lb-next{right:12px}
.lb-arrow.disabled{opacity:.25;pointer-events:none}
#lb-bottom{padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);flex-shrink:0}
#lb-counter{color:#fff;font-size:13px;font-weight:500}
#lb-progress{width:180px;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden}
#lb-progress-bar{height:100%;background:var(--azure);border-radius:2px;transition:width .25s ease}
#lb-thumbs{display:flex;gap:6px;overflow-x:auto;padding:4px 0;max-width:100%;scrollbar-width:none}
#lb-thumbs::-webkit-scrollbar{display:none}
.lb-thumb{width:56px;height:36px;border-radius:4px;object-fit:cover;cursor:pointer;opacity:.45;border:2px solid transparent;flex-shrink:0;transition:all .15s}
.lb-thumb.active{opacity:1;border-color:var(--azure)}
/* ═══ CATALOG SCREEN ═══ */
.catalog-cats{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.catalog-cats::-webkit-scrollbar{display:none}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:all .18s;min-width:90px;flex-shrink:0}
.cat-btn .cat-icon{font-size:22px}
.cat-btn .cat-label{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap}
.cat-btn.active{border-color:transparent;color:#fff}
.cat-btn.active .cat-label{color:#fff}
.catalog-products{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.cat-product-card{background:#fff;border-radius:var(--radius);overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:all .2s;border:1.5px solid transparent}
.cat-product-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.cat-product-card:active{transform:scale(0.97)}
.cat-product-card .thumb{width:100%;height:120px;object-fit:cover;background:#f5f5f5}
.cat-product-card .info{padding:12px}
.cat-product-card .pname{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.cat-product-card .pmol{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:8px}
.cat-product-card .doctors-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.mini-avatar{width:22px;height:22px;border-radius:50%;border:2px solid #fff;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;background:var(--navy);flex-shrink:0}
.doctors-label{font-size:10px;color:var(--muted)}
/* ═══ EMPTY ═══ */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ei{font-size:40px;margin-bottom:10px}
.empty p{font-size:14px}
/* ═══ SECTION HEADER ═══ */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-hdr h2{font-size:17px;font-weight:700;color:var(--navy)}
.sec-hdr span{font-size:12px;color:var(--muted)}
/* ═══ RESPONSIVE ═══ */
@media(max-width:600px){
  .doctor-grid{grid-template-columns:repeat(2,1fr)}
  .product-grid{grid-template-columns:repeat(2,1fr)}
  #lb-thumbs{display:none}
  .lb-arrow{width:40px;height:40px;font-size:18px}
  #lb-prev{left:6px}
  #lb-next{right:6px}
  #topbar{padding:10px 12px}
  .top-left{gap:12px}
  .logo .sub{display:none}
  .logo-icon{width:30px;height:30px;font-size:15px}
  .top-nav-btn{padding:7px 10px;font-size:12px}
  .mr-chip{display:none}
}
@media(min-width:768px){
  .doctor-grid{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:1024px){
  .doctor-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>
<div id="app">

<!-- TOP BAR -->
<div id="topbar">
  <!--Top Left-->
  <div class="top-left">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">💊</div>
    <div>
      <div id="h1" style="color:#fff;font-size:18px;font-weight:700">MedRep Pro</div>
      <div class="sub">Coastal Healthcare</div>
    </div>
  </div>

  <!-- Navigation Toggle -->
  <div class="top-toggle">
    <button class="top-nav-btn"
      id="nav-doctors"
      onclick="showScreen('doctors')">
      👨‍⚕️ Doctors
    </button>
    <button class="top-nav-btn active"
      id="nav-catalog"
      onclick="showScreen('catalog')">
      📋 Catalogue
    </button>
  </div>
  </div>

  <!-- User -->
  <div class="mr-chip">
    👤 MR Vivek
  </div>

</div>

<!-- SCREENS -->
<div id="main">

  <!-- SCREEN: DOCTORS -->
  <div id="screen-doctors" class="screen ">
    <div class="toolbar">
      <div class="search-box">
        <span class="si">🔍</span>
        <input type="text" id="doctor-search" placeholder="Search doctor name…" oninput="filterDoctors()">
      </div>
      <div class="filter-chips" id="spec-filters"></div>
    </div>
    <div class="sec-hdr">
      <h2>My Doctors</h2>
      <span id="doc-count"></span>
    </div>
    <div class="doctor-grid" id="doctor-grid"></div>
  </div>

  <!-- SCREEN: DOCTOR DETAIL -->
  <div id="screen-detail" class="screen">
    <button id="back-btn" onclick="showScreen('doctors')">← Back</button>
    <div class="detail-header" id="detail-header"></div>
    <div class="products-section">
      <h3 id="products-title"></h3>
      <div class="subtitle">
        <span id="products-count"></span>
        <span class="lock" id="lock-msg"></span>
      </div>
      <div class="product-grid" id="product-grid"></div>
    </div>
  </div>

  <!-- SCREEN: CATALOG -->
  <div id="screen-catalog" class="screen active">
    <div class="sec-hdr">
      <h2>Product Catalogue</h2>
      <span id="catalog-count"></span>
    </div>
    <div class="catalog-cats" id="cat-tabs"></div>
    <div class="catalog-products" id="catalog-grid"></div>
  </div>

</div>

</div><!-- /app -->

<!-- LIGHTBOX -->
<div id="lightbox">
  <div id="lb-topbar">
    <div>
      <div id="lb-product-name">Product Name</div>
      <div id="lb-doctor-name">Dr. Name</div>
    </div>
    <button id="lb-close" onclick="closeLightbox()">✕</button>
  </div>
  <div id="lb-image-area">
    <button class="lb-arrow" id="lb-prev" onclick="lbNav(-1)">‹</button>
    <img id="lb-img" src="" alt="Product slide">
    <button class="lb-arrow" id="lb-next" onclick="lbNav(1)">›</button>
  </div>
  <div id="lb-bottom">
    <div id="lb-counter">1 / 10</div>
    <div id="lb-progress"><div id="lb-progress-bar" style="width:10%"></div></div>
    <div id="lb-thumbs"></div>
  </div>
</div>

<script src="content-loader.js"></script>
<script>

// ═══ DOCTORS, PRODUCTS & CATEGORIES ═══
// These used to be hardcoded here. They now live in editable JSON files
// (content/doctors.json, content/products.json, content/categories.json)
// and are loaded at runtime by content-loader.js — edit them via the
// Decap CMS admin panel at /admin, no code changes needed.
let DOCTORS = [];
let META = {};
const SPEC_COLORS = {
  "Orthopaedics":    {color:"#E85D26", bg:"#FFF3EE"},
  "Gynaecology":     {color:"#D946A8", bg:"#FDF0FB"},
  "General Physician":{color:"#1B7FC4",bg:"#EBF5FF"},
  "Ophthalmology":   {color:"#7B2FBE", bg:"#F5EEFF"},
  "ENT":             {color:"#7B2FBE", bg:"#F5EEFF"},
  "Dentistry":       {color:"#7B2FBE", bg:"#F5EEFF"},
  "Paediatrics":     {color:"#0891B2", bg:"#E0F7FA"},
  "Neurology":       {color:"#E85D26", bg:"#FFF3EE"},
  "Dermatology":     {color:"#7B2FBE", bg:"#F5EEFF"},
  "Gastroenterology":{color:"#1B7FC4", bg:"#EBF5FF"},
  "Physician":       {color:"#1B7FC4", bg:"#EBF5FF"},
};

// Cover thumb for each product is just its own image now (no slide-deck indexing)
function getThumbSrc(catalogKey, productIdx) {
  return META[catalogKey].products[productIdx].image;
}

// ═══ STATE ═══
let currentDoctor = null;
let lbSlides = [];
let lbCurrentIdx = 0;
let lbProductName = '';
let lbCatalogKey = '';
let lbDoctorName = '';
let touchStartX = 0;
let touchStartY = 0;
let currentCatalogKey = 'ortho';
let activeCatFilter = 'all';

// ═══ INIT ═══
async function init() {
  const data = await loadContent();
  DOCTORS = data.DOCTORS;
  META = data.META;

  buildSpecFilters();
  renderDoctors(DOCTORS);

  buildCatTabs();
  renderCatalog('ortho');
}

// ═══ SCREEN NAV ═══
function showScreen(name) {
   // Hide all screens
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  // Show selected screen
  document.getElementById('screen-' + name).classList.add('active');

   // Remove active from top navigation
  document.querySelectorAll('.top-nav-btn').forEach(btn =>
    btn.classList.remove('active')
  );

  // Set active button
    
  if(name === 'doctors' || name === 'detail') {
    document.getElementById('nav-doctors').classList.add('active');
  } else {
    document.getElementById('nav-catalog').classList.add('active');
  }
  window.scrollTo(0,0);
}

// ═══ SPEC FILTERS ═══
function buildSpecFilters() {
  const specs = ['All', ...new Set(DOCTORS.map(d => d.spec))];
  const cont = document.getElementById('spec-filters');
  cont.innerHTML = specs.map(s =>
    `<div class="chip ${s==='All'?'active':''}" onclick="setSpecFilter('${s}', this)">${s}</div>`
  ).join('');
}

let activeSpec = 'All';
function setSpecFilter(spec, el) {
  activeSpec = spec;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterDoctors();
}

function filterDoctors() {
  const q = document.getElementById('doctor-search').value.toLowerCase();
  const filtered = DOCTORS.filter(d => {
    const matchSpec = activeSpec === 'All' || d.spec === activeSpec;
    const matchQ = !q || d.name.toLowerCase().includes(q) || d.spec.toLowerCase().includes(q);
    return matchSpec && matchQ;
  });
  renderDoctors(filtered);
}

// ═══ DOCTOR GRID ═══
function renderDoctors(docs) {
  const grid = document.getElementById('doctor-grid');
  document.getElementById('doc-count').textContent = docs.length + ' doctors';
  if(!docs.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="ei">🔍</div><p>No doctors found</p></div>';
    return;
  }
  grid.innerHTML = docs.map(d => {
    const sc = SPEC_COLORS[d.spec] || {color:'#64748B',bg:'#F1F5F9'};
    return `<div class="doctor-card" onclick="openDoctorDetail(${d.id})">
      <div class="doc-avatar">${d.initials}</div>
      <div class="doc-name">${d.name}</div>
      <div class="doc-deg">${d.deg}</div>
      <div class="spec-badge" style="background:${sc.bg};color:${sc.color}">${d.spec}</div>
      <div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px">${d.hospital}</div>
      <button class="view-btn" style="background:${sc.color}">View Products →</button>
    </div>`;
  }).join('');
}

// ═══ DOCTOR DETAIL ═══
/* OLD CODE Backup as per the categories product 
function openDoctorDetail(docId) {
  currentDoctor = DOCTORS.find(d => d.id === docId);
  const d = currentDoctor;
  const cat = META[d.catalog];
  const sc = SPEC_COLORS[d.spec] || {color:'#1B3A6B',bg:'#EBF5FF'};

  document.getElementById('detail-header').innerHTML = `
    <div class="detail-avatar">${d.initials}</div>
    <div class="detail-info">
      <h2>${d.name}</h2>
      <p>${d.deg} • ${d.hospital}</p>
      <div class="detail-spec-badge">${cat.icon} ${d.spec}</div>
    </div>`;

  document.getElementById('products-title').textContent = `Products for ${d.spec}`;
  const products = cat.products;
  document.getElementById('products-count').textContent = products.length + ' products matched';
  
  const otherCount = Object.values(META).filter(c=>c.id !== d.catalog).reduce((a,c)=>a+c.products.length,0);
  document.getElementById('lock-msg').textContent = `🔒 ${otherCount} other products hidden`;

  const grid = document.getElementById('product-grid');
  grid.innerHTML = products.map((p,i) => {
    const color = META[d.catalog].color;
    const thumb = getThumbSrc(d.catalog, i);
    return `<div class="product-card" onclick="openLightbox('${d.catalog}',${i},'${p.name}','${d.name}')">
      <img class="product-thumb" src="${thumb}" alt="${p.name}" loading="lazy">
      <div class="product-info">
        <div class="product-name">${p.name}  </div>

// ═══ DOCTOR DETAIL ═══
function openDoctorDetail(docId) {
  currentDoctor = DOCTORS.find(d => d.id === docId);
  const d = currentDoctor;
  const cat = META[d.catalog]; // still used for the badge icon/color
  const sc = SPEC_COLORS[d.spec] || {color:'#1B3A6B',bg:'#EBF5FF'};

  document.getElementById('detail-header').innerHTML = `
    <div class="detail-avatar">${d.initials}</div>
    <div class="detail-info">
      <h2>${d.name}</h2>
      <p>${d.deg} • ${d.hospital}</p>
      <div class="detail-spec-badge">${cat.icon} ${d.spec}</div>
    </div>`;

  document.getElementById('products-title').textContent = `Products for ${d.spec}`;

  // ── Build a flat lookup of every product across all categories,
  // keeping track of which category + index each one lives at
  // (needed for getThumbSrc/openLightbox, which are category-indexed).
  const allProductsFlat = [];
  Object.values(META).forEach(c => {
    c.products.forEach((p, i) => {
      allProductsFlat.push({ ...p, categoryId: c.id, categoryIndex: i, categoryColor: c.color });
    });
  });

  // ── Pick only the products explicitly assigned to this doctor,
  // in the order they were selected in the CMS.
  const assignedNames = d.products || [];
  const products = assignedNames
    .map(name => allProductsFlat.find(p => p.name === name))
    .filter(Boolean); // drops any name that no longer matches a product (renamed/deleted)

  document.getElementById('products-count').textContent = products.length + ' products matched';

  const totalProductCount = allProductsFlat.length;
  const otherCount = totalProductCount - products.length;
  document.getElementById('lock-msg').textContent = `🔒 ${otherCount} other products hidden`;

  const grid = document.getElementById('product-grid');
  grid.innerHTML = products.map(p => {
    const color = p.categoryColor;
    const thumb = getThumbSrc(p.categoryId, p.categoryIndex);
    return `<div class="product-card" onclick="openLightbox('${p.categoryId}',${p.categoryIndex},'${p.name}','${d.name}')">
      <img class="product-thumb" src="${thumb}" alt="${p.name}" loading="lazy">
      <div class="product-info">
        <div class="product-name">${p.name}  </div>
        <div class="product-molecule">${p.molecule}</div>
        <button class="present-btn" style="background:${color}">▶ Present</button>
      </div>
    </div>`;
  }).join('');

  showScreen('detail');
}

// ═══ LIGHTBOX ═══

function openLightbox(catalogKey, productIdx, productName, doctorName) {
  // lbSlides is just each product's own image, in catalogue order — no
  // cover/closing slides mixed in, so counts always match the catalogue.
  lbSlides = META[catalogKey].products.map(p => p.image);
  // The product index IS the slide index (1:1 mapping).
  lbCurrentIdx = productIdx;
  lbProductName = productName;
  lbCatalogKey = catalogKey;
  lbDoctorName = doctorName;

  document.getElementById('lb-product-name').textContent = productName;
  document.getElementById('lb-doctor-name').textContent = 'Presenting to ' + doctorName;

  buildThumbStrip(catalogKey);
  updateLightboxSlide();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function buildThumbStrip(catalogKey) {
  // Thumbnails mirror lbSlides exactly — product images only.
  const thumbs = document.getElementById('lb-thumbs');
  thumbs.innerHTML = lbSlides.map((src,i) =>
    `<img class="lb-thumb ${i===lbCurrentIdx?'active':''}" src="${src}" onclick="lbJump(${i})" data-idx="${i}">`
  ).join('');
}

function updateLightboxSlide() {
  const img = document.getElementById('lb-img');
  img.src = lbSlides[lbCurrentIdx];
  const total = lbSlides.length;
  document.getElementById('lb-counter').textContent = (lbCurrentIdx+1) + ' / ' + total;

  // lbCurrentIdx is a direct index into META[catalogKey].products, so the
  // header always names an actual product — never a cover/closing slide.
  lbProductName = META[lbCatalogKey].products[lbCurrentIdx].name;
  document.getElementById('lb-product-name').textContent = lbProductName;
  document.getElementById('lb-doctor-name').textContent = 'Presenting to ' + lbDoctorName;
  document.getElementById('lb-progress-bar').style.width = ((lbCurrentIdx+1)/total*100) + '%';
  document.getElementById('lb-prev').classList.toggle('disabled', lbCurrentIdx === 0);
  document.getElementById('lb-next').classList.toggle('disabled', lbCurrentIdx === total-1);
  // Update thumb highlights
  document.querySelectorAll('.lb-thumb').forEach((t,i) => {
    t.classList.toggle('active', i === lbCurrentIdx);
  });
  // Scroll active thumb into view
  const activeThumb = document.querySelector('.lb-thumb.active');
  if(activeThumb) activeThumb.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function lbNav(dir) {
  const newIdx = lbCurrentIdx + dir;
  if(newIdx < 0 || newIdx >= lbSlides.length) return;
  lbCurrentIdx = newIdx;
  updateLightboxSlide();
}

function lbJump(idx) {
  lbCurrentIdx = idx;
  updateLightboxSlide();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// Touch swipe for lightbox
const lb = document.getElementById('lightbox');
lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, {passive:true});
lb.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    lbNav(dx < 0 ? 1 : -1);
  }
}, {passive:true});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key === 'ArrowRight') lbNav(1);
  if(e.key === 'ArrowLeft') lbNav(-1);
  if(e.key === 'Escape') closeLightbox();
});

function buildCatTabs() {
  const tabs = document.getElementById('cat-tabs');
  const cats = Object.values(META).map(m => ({
    key: m.id,
    label: m.title,
    icon: m.icon,
  }));
  tabs.innerHTML = cats.map(c => {
    const m = META[c.key];
    return `<button class="cat-btn ${c.key===currentCatalogKey?'active':''}" 
      id="catbtn-${c.key}"
      style="${c.key===currentCatalogKey ? `background:${m.color};border-color:${m.color}` : ''}"
      onclick="renderCatalog('${c.key}')">
      <span class="cat-icon">${c.icon}</span>
      <span class="cat-label">${c.label}</span>
    </button>`;
  }).join('');
}

function renderCatalog(key) {
  currentCatalogKey = key;
  // Update tab styling
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background='';
    b.style.borderColor='';
  });
  const activeTab = document.getElementById('catbtn-' + key);
  if(activeTab) {
    activeTab.classList.add('active');
    activeTab.style.background = META[key].color;
    activeTab.style.borderColor = META[key].color;
  }

  const cat = META[key];
  const products = cat.products;

  // Showing count is always derived from the product list itself (never
  // from the underlying slide deck length), so it can't drift from the
  // count shown once a product is opened in the lightbox.
  document.getElementById('catalog-count').textContent = 'Showing : ' + products.length + ' Products';

  // For each product, find doctors who are linked to this catalog
  const grid = document.getElementById('catalog-grid');
  grid.innerHTML = products.map((p, i) => {
    const thumb = getThumbSrc(key, i);
    const linkedDoctors = DOCTORS.filter(d => d.catalog === key).slice(0,3);
    const doctorAvatars = linkedDoctors.map(d =>
      `<div class="mini-avatar" title="${d.name}">${d.initials}</div>`
    ).join('');
    const extraCount = DOCTORS.filter(d => d.catalog === key).length - 3;
    return `<div class="cat-product-card" onclick="openCatProduct('${key}',${i},'${p.name}')">
      <img class="thumb" src="${thumb}" alt="${p.name}" loading="lazy">
      <div class="info">
        <div class="pname">${p.name}</div>
        <div class="pmol">${p.molecule}</div>
        <div class="doctors-row">
          ${doctorAvatars}
          ${extraCount > 0 ? `<div class="mini-avatar" style="background:var(--muted)">+${extraCount}</div>` : ''}
          <span class="doctors-label">${DOCTORS.filter(d=>d.catalog===key).length} doctors</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openCatProduct(catalogKey, productIdx, productName) {
  // Open lightbox directly from catalog with first doctor of that type
  const doc = DOCTORS.find(d => d.catalog === catalogKey);
  const docName = doc ? doc.name : 'Doctor';
  openLightbox(catalogKey, productIdx, productName, docName);
}
